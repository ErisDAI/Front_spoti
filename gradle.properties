# Habilita el uso de librerías AndroidX
android.useAndroidX=true
# Desactivamos Jetifier porque todas nuestras dependencias (Media3, Hilt, Coil, Room) ya son AndroidX nativas.
android.enableJetifier=false

# Optimizaciones de rendimiento para el Gradle Daemon
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
